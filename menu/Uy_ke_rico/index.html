<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uy Ke Rico | Menú Digital Punto 506</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #130f0e; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .serif-title { font-family: 'Cinzel', serif; color: #d4a373; }
        .accent-border { border-color: #d4a373; }
        .bg-gold { background-color: #d4a373; }
        
        /* Estilos para el carrusel */
        #slider-container { display: flex; transition: transform 0.7s ease-in-out; }
        .slide { min-width: 100%; position: relative; height: 350px; }
        
        /* Animación para el modal */
        .modal-active { transform: translateY(0%); }
        .modal-inactive { transform: translateY(100%); }
    </style>
</head>
<body class="pb-24">

    <div class="relative w-full overflow-hidden bg-black border-b border-[#d4a373]/20">
        <div id="slider-container">
            </div>
        
        <div class="absolute inset-0 bg-gradient-to-t from-[#130f0e] via-transparent to-transparent pointer-events-none"></div>
        
        <button onclick="moveSlider(-1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/30 hover:bg-[#d4a373] text-white p-2 transition-all">❮</button>
        <button onclick="moveSlider(1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/30 hover:bg-[#d4a373] text-white p-2 transition-all">❯</button>
    </div>

    <header class="py-8 text-center border-b border-[#d4a373]/20 bg-[#1c1614]">
        <h1 class="serif-title text-2xl tracking-widest uppercase">Uy Ke Rico</h1>
        <p class="text-[10px] tracking-[0.3em] text-[#d4a373]/60 mt-2">MENU EXCLUSIVO EN PUNTO 506</p>
    </header>

    <main id="menu-container" class="max-w-md mx-auto px-6 mt-8 space-y-10">
        </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-[#1c1614] border-t border-[#d4a373]/30 p-4 transform translate-y-full transition-transform duration-300 shadow-[0_-10px_20px_rgba(0,0,0,0.5)] z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="cursor-pointer" onclick="toggleCartModal(true)">
                <span id="cart-count" class="text-[10px] text-[#d4a373] font-bold block uppercase">0 ARTÍCULOS (VER DETALLE)</span>
                <span id="cart-total" class="text-xl font-bold text-white">₡0</span>
            </div>
            <button onclick="enviarPedido()" class="bg-gold text-[#130f0e] px-6 py-3 font-black text-xs uppercase tracking-widest rounded-sm hover:bg-white transition-colors">
                Pedir por WhatsApp
            </button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/90 z-50 transition-transform duration-500 translate-y-full flex flex-col">
        <div class="p-6 border-b border-[#d4a373]/20 flex justify-between items-center bg-[#1c1614]">
            <h2 class="serif-title text-lg uppercase tracking-widest">Tu Pedido</h2>
            <button onclick="toggleCartModal(false)" class="text-[#d4a373] text-sm font-bold uppercase tracking-tighter">Cerrar</button>
        </div>
        
        <div id="cart-items-list" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>

        <div class="p-6 bg-[#1c1614] border-t border-[#d4a373]/20">
            <div class="flex justify-between mb-4">
                <span class="text-stone-500 uppercase text-xs tracking-widest">Total Estimado</span>
                <span id="modal-total" class="text-[#d4a373] font-bold">₡0</span>
            </div>
            <button onclick="enviarPedido()" class="w-full bg-gold text-[#130f0e] py-4 font-black text-xs uppercase tracking-widest">Confirmar y Enviar</button>
        </div>
    </div>

    <script src="productos.js"></script>
    <script>
        // --- CONFIGURACIÓN DEL CARRUSEL ---
        const FOTOS_SLIDER = [
            { url: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=1000', nombre: 'Burgers Artesanales' },
            { url: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1000', nombre: 'Pizzas Premium' },
            { url: 'https://images.unsplash.com/photo-1513185158878-8d8c196b7f81?q=80&w=1000', nombre: 'Combos Especiales' }
        ];

        let currentSlide = 0;
        let carrito = [];

        function renderSlider() {
            const slider = document.getElementById('slider-container');
            slider.innerHTML = FOTOS_SLIDER.map(foto => `
                <div class="slide">
                    <img src="${foto.url}" class="w-full h-full object-cover">
                    <div class="absolute bottom-12 left-0 w-full text-center px-4">
                        <span class="text-[9px] uppercase tracking-[0.5em] text-[#d4a373] block mb-2 font-bold">Recomendado</span>
                        <h3 class="serif-title text-xl text-white tracking-[0.2em] uppercase italic drop-shadow-lg">${foto.nombre}</h3>
                    </div>
                </div>
            `).join('');
        }

        function moveSlider(direction) {
            const slider = document.getElementById('slider-container');
            currentSlide = (currentSlide + direction + FOTOS_SLIDER.length) % FOTOS_SLIDER.length;
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        // Auto-slide cada 5 segundos
        setInterval(() => moveSlider(1), 5000);

        // --- LÓGICA DEL MENÚ ---
        function renderMenu() {
            const container = document.getElementById('menu-container');
            MENU_DATA.forEach(cat => {
                let html = `<section>
                    <h2 class="serif-title text-sm tracking-[0.4em] mb-6 border-b border-[#d4a373]/10 pb-2 uppercase">${cat.categoria}</h2>
                    <div class="space-y-6">`;
                
                cat.items.forEach(item => {
                    html += `
                        <div class="flex justify-between items-start group">
                            <div class="flex-1 pr-4">
                                <h3 class="text-white font-bold text-sm uppercase tracking-wider">${item.nombre}</h3>
                                <p class="text-stone-500 text-[11px] mt-1 leading-relaxed">${item.desc}</p>
                                <span class="text-[#d4a373] font-bold text-sm block mt-2">₡${item.precio}</span>
                            </div>
                            <button onclick="agregarAlCarrito(${item.id})" class="border border-[#d4a373]/30 p-2 hover:bg-[#d4a373] hover:text-black transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
                            </button>
                        </div>`;
                });
                html += `</div></section>`;
                container.innerHTML += html;
            });
        }

        // --- LÓGICA DEL CARRITO ---
        function agregarAlCarrito(id) {
            let item;
            MENU_DATA.forEach(c => {
                let found = c.items.find(i => i.id === id);
                if(found) item = { ...found, cartId: Date.now() }; // cartId único para poder borrar repetidos
            });
            
            carrito.push(item);
            actualizarUI();
        }

        function eliminarDelCarrito(cartId) {
            carrito = carrito.filter(item => item.cartId !== cartId);
            actualizarUI();
            if(carrito.length === 0) toggleCartModal(false);
        }

        function toggleCartModal(show) {
            const modal = document.getElementById('cart-modal');
            modal.style.transform = show ? 'translateY(0%)' : 'translateY(100%)';
        }

        function actualizarUI() {
            const bar = document.getElementById('cart-bar');
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            
            // Barra inferior
            if(carrito.length > 0) bar.classList.remove('translate-y-full');
            else bar.classList.add('translate-y-full');

            document.getElementById('cart-count').innerText = `${carrito.length} ARTÍCULOS (VER DETALLE)`;
            document.getElementById('cart-total').innerText = `₡${total.toLocaleString()}`;
            document.getElementById('modal-total').innerText = `₡${total.toLocaleString()}`;

            // Lista en el Modal
            const list = document.getElementById('cart-items-list');
            if(carrito.length === 0) {
                list.innerHTML = `<p class="text-center text-stone-600 uppercase text-[10px] mt-10 tracking-[0.2em]">No hay productos aún</p>`;
            } else {
                list.innerHTML = carrito.map(item => `
                    <div class="flex justify-between items-center bg-black/40 p-4 border border-white/5">
                        <div>
                            <h4 class="text-white text-xs font-bold uppercase">${item.nombre}</h4>
                            <p class="text-[#d4a373] text-[10px]">₡${item.precio.toLocaleString()}</p>
                        </div>
                        <button onclick="eliminarDelCarrito(${item.cartId})" class="text-red-500/50 hover:text-red-500 p-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"/></svg>
                        </button>
                    </div>
                `).join('');
            }
        }

        function enviarPedido() {
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            let texto = "¡Hola! Quiero hacer un pedido desde *Punto 506*:\n\n";
            
            const resumen = {};
            carrito.forEach(i => resumen[i.nombre] = (resumen[i.nombre] || 0) + 1);
            
            for(let prod in resumen) {
                texto += `• ${resumen[prod]}x ${prod}\n`;
            }
            
            texto += `\n*Total: ₡${total.toLocaleString()}*\n\n¿Me confirman el tiempo de entrega?`;
            const url = `https://wa.me/50689537426?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        }

        // Inicialización
        renderSlider();
        renderMenu();
    </script>
</body>
</html>
