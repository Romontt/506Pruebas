<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uy Ke Rico | Menú Digital Punto 506</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #130f0e; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .serif-title { font-family: 'Cinzel', serif; color: #d4a373; }
        .bg-gold { background-color: #d4a373; }
        
        #slider-container { display: flex; transition: transform 0.7s ease-in-out; }
        
        /* Altura adaptativa: 350px en móvil, 50% del alto de pantalla en PC */
        .slide { min-width: 100%; position: relative; height: 350px; }
        @media (min-width: 768px) {
            .slide { height: 55vh; }
        }
        
        .slide-caption-bg {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
        }
    </style>
</head>
<body class="pb-32">

    <div class="relative w-full overflow-hidden bg-black border-b border-[#d4a373]/30">
        <div id="slider-container"></div>
        
        <button onclick="moveSlider(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/30 backdrop-blur-sm border border-white/5 hover:bg-[#d4a373] hover:text-black text-white/50 w-10 h-10 flex items-center justify-center rounded-full transition-all z-20">❮</button>
        <button onclick="moveSlider(1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/30 backdrop-blur-sm border border-white/5 hover:bg-[#d4a373] hover:text-black text-white/50 w-10 h-10 flex items-center justify-center rounded-full transition-all z-20">❯</button>
    </div>

    <header class="py-12 text-center border-b border-[#d4a373]/20 bg-[#1c1614] relative">
        <button onclick="history.back()" class="absolute left-6 top-6 flex items-center gap-2 text-[#d4a373] hover:text-white transition-colors group">
            <svg class="w-4 h-4 transition-transform group-active:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="text-[10px] uppercase tracking-[0.2em] font-black">Volver al Directorio</span>
        </button>

        <h1 class="serif-title text-3xl tracking-[0.2em] uppercase mt-6">Uy Ke Rico</h1>
        <p class="text-[11px] tracking-[0.4em] text-[#d4a373]/50 mt-2 uppercase">Menú Exclusivo en Punto 506</p>
    </header>

    <main id="menu-container" class="max-w-md mx-auto px-6 mt-12 space-y-16"></main>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-[#1c1614] border-t border-[#d4a373]/30 p-4 transform translate-y-full transition-transform duration-300 shadow-[0_-10px_20px_rgba(0,0,0,0.5)] z-40">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3 px-1">
                <span id="cart-count" class="text-[10px] text-[#d4a373] font-bold uppercase tracking-wider">0 ARTÍCULOS</span>
                <span id="cart-total" class="text-xl font-bold text-white tracking-tight">₡0</span>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleCartModal(true)" class="flex-1 border border-[#d4a373]/50 text-[#d4a373] py-3 font-black text-[10px] uppercase tracking-[0.2em] rounded-sm hover:bg-[#d4a373]/10 transition-colors">
                    Ver Carrito
                </button>
                <button onclick="enviarPedido()" class="flex-[1.5] bg-gold text-[#130f0e] py-3 font-black text-[10px] uppercase tracking-[0.2em] rounded-sm hover:bg-white transition-colors">
                    Enviar Pedido
                </button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/95 z-50 transition-transform duration-500 translate-y-full flex flex-col">
        <div class="p-6 border-b border-[#d4a373]/20 flex justify-between items-center bg-[#1c1614]">
            <h2 class="serif-title text-lg uppercase tracking-widest">Tu Pedido</h2>
            <button onclick="toggleCartModal(false)" class="text-[#d4a373] text-sm font-bold uppercase">Cerrar</button>
        </div>
        <div id="cart-items-list" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-[#1c1614] border-t border-[#d4a373]/20">
            <div class="flex justify-between mb-4">
                <span class="text-stone-500 uppercase text-xs tracking-widest">Total Estimado</span>
                <span id="modal-total" class="text-[#d4a373] font-bold">₡0</span>
            </div>
            <button onclick="enviarPedido()" class="w-full bg-gold text-[#130f0e] py-4 font-black text-xs uppercase tracking-widest">Confirmar y Enviar</button>
        </div>
    </div>

    <script src="productos.js"></script>
    <script>
        const FOTOS_SLIDER = [
            { url: 'papas.webp', nombre: 'Papas Especiales' },
            { url: 'costilla.webp', nombre: 'Costilla BBQ' },
            { url: 'https://images.unsplash.com/photo-1513185158878-8d8c196b7f81?q=80&w=1000', nombre: 'Combos Especiales' }
        ];

        let currentSlide = 0;
        let carrito = [];

        function renderSlider() {
            const slider = document.getElementById('slider-container');
            slider.innerHTML = FOTOS_SLIDER.map(foto => `
                <div class="slide">
                    <img src="${foto.url}" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 left-0 w-full p-8 slide-caption-bg">
                        <span class="text-[9px] uppercase tracking-[0.5em] text-[#d4a373] block mb-1 font-black">Recomendado</span>
                        <h3 class="serif-title text-2xl text-white tracking-[0.1em] uppercase italic">${foto.nombre}</h3>
                    </div>
                </div>
            `).join('');
        }

        function moveSlider(direction) {
            const slider = document.getElementById('slider-container');
            currentSlide = (currentSlide + direction + FOTOS_SLIDER.length) % FOTOS_SLIDER.length;
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        setInterval(() => moveSlider(1), 6000);

        function renderMenu() {
            const container = document.getElementById('menu-container');
            if (typeof MENU_DATA !== 'undefined') {
                MENU_DATA.forEach(cat => {
                    let html = `<section>
                        <h2 class="serif-title text-sm tracking-[0.4em] mb-10 border-b border-[#d4a373]/10 pb-2 uppercase">${cat.categoria}</h2>
                        <div class="space-y-10">`;
                    cat.items.forEach(item => {
                        html += `
                            <div class="flex justify-between items-start">
                                <div class="flex-1 pr-4">
                                    <h3 class="text-white font-bold text-sm uppercase tracking-wider">${item.nombre}</h3>
                                    <p class="text-stone-500 text-[11px] mt-1 leading-relaxed">${item.desc}</p>
                                    <span class="text-[#d4a373] font-bold text-sm block mt-2">₡${item.precio.toLocaleString()}</span>
                                </div>
                                <button onclick="agregarAlCarrito(${item.id})" class="border border-[#d4a373]/40 p-2.5 hover:bg-[#d4a373] hover:text-black transition-all active:scale-90">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5"/></svg>
                                </button>
                            </div>`;
                    });
                    html += `</div></section>`;
                    container.innerHTML += html;
                });
            }
        }

        function agregarAlCarrito(id) {
            let item;
            MENU_DATA.forEach(c => {
                let found = c.items.find(i => i.id === id);
                if(found) item = { ...found, cartId: Date.now() };
            });
            if(item) {
                carrito.push(item);
                actualizarUI();
            }
        }

        function eliminarDelCarrito(cartId) {
            carrito = carrito.filter(item => item.cartId !== cartId);
            actualizarUI();
            if(carrito.length === 0) toggleCartModal(false);
        }

        function toggleCartModal(show) {
            const modal = document.getElementById('cart-modal');
            modal.style.transform = show ? 'translateY(0%)' : 'translateY(100%)';
        }

        function actualizarUI() {
            const bar = document.getElementById('cart-bar');
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            
            if(carrito.length > 0) bar.classList.remove('translate-y-full');
            else bar.classList.add('translate-y-full');

            document.getElementById('cart-count').innerText = `${carrito.length} ARTÍCULOS`;
            document.getElementById('cart-total').innerText = `₡${total.toLocaleString()}`;
            document.getElementById('modal-total').innerText = `₡${total.toLocaleString()}`;

            const list = document.getElementById('cart-items-list');
            if(carrito.length === 0) {
                list.innerHTML = `<p class="text-center text-stone-600 uppercase text-[10px] mt-10 tracking-[0.2em]">Tu carrito está vacío</p>`;
            } else {
                list.innerHTML = carrito.map(item => `
                    <div class="flex justify-between items-center bg-white/5 p-4 border border-white/5">
                        <div>
                            <h4 class="text-white text-xs font-bold uppercase">${item.nombre}</h4>
                            <p class="text-[#d4a373] text-[10px]">₡${item.precio.toLocaleString()}</p>
                        </div>
                        <button onclick="eliminarDelCarrito(${item.cartId})" class="text-red-500/60 hover:text-red-500 p-2 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"/></svg>
                        </button>
                    </div>
                `).join('');
            }
        }

        function enviarPedido() {
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            let texto = "¡Hola! Quiero hacer un pedido desde *Punto 506*:\n\n";
            const resumen = {};
            carrito.forEach(i => resumen[i.nombre] = (resumen[i.nombre] || 0) + 1);
            for(let prod in resumen) {
                texto += `• ${resumen[prod]}x ${prod}\n`;
            }
            texto += `\n*Total: ₡${total.toLocaleString()}*\n\n¿Me confirman el tiempo de entrega?`;
            const url = `https://wa.me/50689537426?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        }

        renderSlider();
        renderMenu();
    </script>
</body>
</html>
